replicaCount: 3

image:
  pullPolicy: Always

config:
  environment: production
  memoryBackend: redis
  rateLimitBackend: "redis"  # AJOUTER — partage l'état entre replicas

resources:
  requests:
    memory: 512Mi
    cpu: 500m
  limits:
    memory: 1Gi
    cpu: 1000m

autoscaling:
  enabled: true
  maxReplicas: 10

persistence:
  enabled: false  # prod utilise Redis ou Postgres

secrets:
  existingSecret: langgraph-secrets
