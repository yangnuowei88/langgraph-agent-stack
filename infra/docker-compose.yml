# docker-compose.yml — Local development environment
#
# Usage:
#   Standard (SQLite backend):
#     docker compose up
#
#   With Redis backend:
#     docker compose --profile redis up
#
# Prerequisites:
#   Copy .env.example to .env and fill in required values (at minimum ANTHROPIC_API_KEY).


services:
  # ---------------------------------------------------------------------------
  # Application service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: langgraph-agent-stack:local
    container_name: langgraph-app
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ../.env
    environment:
      # Ensure the app can write SQLite data to the mounted volume
      SQLITE_PATH: /app/data/memory.db
    volumes:
      # Persist SQLite database across container restarts
      - sqlite-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - langgraph-net

  # ---------------------------------------------------------------------------
  # Redis service — optional, activate with: --profile redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: langgraph-redis
    restart: unless-stopped
    profiles:
      - redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD env var}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - langgraph-net

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  sqlite-data:
    driver: local
  redis-data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  langgraph-net:
    driver: bridge
