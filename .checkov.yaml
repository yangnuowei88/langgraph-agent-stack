# Checkov policy configuration — infra DevSecOps (CI + scripts/infra-devsecops.sh)
# https://www.checkov.io/2.Basics/Suppressing%20and%20Skipping%20Policies.html

quiet: true
compact: true

skip-check:
  # --- Rendered Kubernetes / Helm (prod overlay + documented deploy choices) ---
  - CKV_K8S_35  # secrets via envFrom — standard for pydantic-settings / 12-factor
  - CKV_K8S_37  # UID 1001 — non-root appuser from Dockerfile
  - CKV_K8S_40  # same policy family as CKV_K8S_37 (high UID) — template uses 1001
  - CKV_K8S_43  # image digest — pin @sha256 in prod CD (see docs/security.md supply chain)
  - CKV_K8S_15  # imagePullPolicy Always — set in values.prod.yaml; dev uses IfNotPresent
  - CKV2_K8S_6  # NetworkPolicy — disabled in chart defaults; enabled in values.prod.yaml

