replicaCount: 1  # SQLite ne supporte qu'un seul écrivain. Utilisez redis ou postgres pour scaler.

image:
  repository: langgraph-agent-stack
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  host: langgraph.example.com
  tls: false

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

config:
  logLevel: INFO
  environment: production
  # WARNING: sqlite with emptyDir loses all data on pod restart.
  # Use redis or postgres for durable persistence in production.
  memoryBackend: sqlite
  sqlitePath: /app/data/memory.db
  maxTokens: "4096"
  rateLimitBackend: "memory"  # "redis" requis pour multi-replica (partage l'état entre pods)

# PersistentVolume for /app/data (default sqlitePath).  With memoryBackend=sqlite,
# this stores both checkpoints and run history.  With redis/postgres, checkpoints
# live in the external service but run history still uses SQLite at sqlitePath —
# enable persistence here if you need that audit trail across pod restarts; with
# persistence.enabled=false, emptyDir is expected (run history is ephemeral).
persistence:
  enabled: true
  mountPath: /app/data
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

llm:
  provider: anthropic
  anthropicModel: claude-3-5-sonnet-20241022
  openaiModel: gpt-4o
  googleModel: gemini-1.5-pro
  ollamaBaseUrl: http://localhost:11434
  ollamaModel: llama3.2

secrets:
  existingSecret: ""
  anthropicApiKey: ""
  openaiApiKey: ""
  googleApiKey: ""
  redisUrl: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  # Example — AWS IRSA role for EKS:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/my-role

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10

networkPolicy:
  enabled: false
  ingressNamespaceLabel: {}
  extraEgressRules: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1

namespace:
  create: true
  name: langgraph-agents

serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s

# Grace period must exceed STREAM_TIMEOUT_SECONDS so in-flight SSE streams
# finish before Kubernetes kills the pod.  120s (stream timeout) + 30s buffer.
terminationGracePeriodSeconds: 150
