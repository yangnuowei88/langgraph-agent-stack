{{/*
  Secret management pattern — External Secrets Operator (ESO) / Sealed Secrets / SOPS

  This template follows the "existingSecret" pattern:
  - In production, set secrets.existingSecret (e.g. "langgraph-secrets" in values.prod.yaml).
    The chart will NOT create this Secret; it must be provisioned externally BEFORE helm install.
    Recommended approaches:
      * External Secrets Operator: create an ExternalSecret CR that pulls from AWS Secrets Manager,
        GCP Secret Manager, HashiCorp Vault, etc. and writes a Secret named "langgraph-secrets"
        into the same namespace. ESO handles rotation automatically.
      * Sealed Secrets (Bitnami): encrypt the Secret with kubeseal and commit the SealedSecret
        manifest to Git. The in-cluster controller decrypts it at apply time.
      * SOPS + Helm secrets plugin: encrypt values.prod.yaml and decrypt at deploy time.
  - In non-production / local dev, leave secrets.existingSecret empty ("") and provide plain
    values via --set or a local override file. The chart will create the Secret from those values.
    Never commit real credentials to source control.

  The deployment always references the secret via the "langgraph-agent-stack.secretName" helper
  (see _helpers.tpl) which resolves to existingSecret when set, or to the chart-managed Secret.
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langgraph-agent-stack.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "langgraph-agent-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: {{ include "langgraph-agent-stack.name" . }}
  annotations:
    note: "Do not commit real credentials to source control. Use External Secrets Operator, Sealed Secrets, or SOPS for production."
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | b64enc | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | b64enc | quote }}
  {{- /* Inbound Bearer auth — rendered only when set so an unset value does
         not inject an empty env var. API_KEY = legacy single shared secret;
         API_KEYS = comma-separated multi-tenant list (any key accepted;
         list old + new keys for zero-downtime rotation). */}}
  {{- with .Values.secrets.apiKey }}
  API_KEY: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.secrets.apiKeys }}
  API_KEYS: {{ . | b64enc | quote }}
  {{- end }}
{{- end }}
